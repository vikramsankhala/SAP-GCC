# Render Blueprint - Vikram Sankhala Portfolio
# Web service with Flask + Anthropic AI Assistant
# https://render.com/docs/web-services

services:
  - type: web
    name: vikram-sankhala-portfolio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Add your API key in Render Dashboard
    # Optional: enable preview deployments for PRs
    previews:
      generation: automatic
